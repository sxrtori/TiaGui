<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SportX | Editar produto</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="edit-product">
  <main class="section">
    <div class="container" style="max-width:880px;">
      <a href="meus-produtos.html" class="btn btn-light" style="margin-bottom:16px;">← Voltar para meus produtos</a>
      <h1 style="margin-bottom:10px;">Editar produto</h1>
      <form id="sellerProductForm" class="auth-form panel seller-form-pro" style="padding:20px; display:grid; gap:14px;">
        <div class="input-group"><label>Nome</label><input type="text" id="sellerProductName" required /></div>
        <div class="input-group"><label>Descrição</label><textarea id="sellerProductDescription" rows="4" required></textarea></div>
        <div class="form-grid" style="grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px;">
          <div class="input-group"><label>Preço</label><input type="number" id="sellerProductPrice" min="0" step="0.01" required /></div>
          <div class="input-group"><label>Desconto (%)</label><input type="number" id="sellerProductDiscount" min="0" max="90" value="0" /></div>
          <div class="input-group"><label>Categoria</label><select id="sellerProductCategory"><option>Masculino</option><option>Feminino</option><option>Calçados</option><option>Acessórios</option><option>Esportes</option></select></div>
          <div class="input-group"><label>Gênero</label><select id="sellerProductGender"><option>Unissex</option><option>Masculino</option><option>Feminino</option></select></div>
          <div class="input-group"><label>Modalidade</label><input type="text" id="sellerProductSport" required /></div>
          <div class="input-group"><label>Marca</label><input type="text" id="sellerProductBrand" required /></div>
          <div class="input-group"><label>Cashback (%)</label><input type="number" id="sellerProductCashback" min="0" max="20" value="3" /></div>
          <div class="input-group"><label>Estoque</label><input type="number" id="sellerProductStock" min="0" value="1" required /></div>
        </div>

        <div class="form-grid" style="grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px;">
          <div class="input-group"><label>Peso (kg)</label><input type="number" id="sellerProductWeight" min="0.001" step="0.001" value="0.300" required /></div>
          <div class="input-group"><label>CEP de origem</label><input type="text" id="sellerProductOriginCep" maxlength="9" value="01001-000" required /></div>
          <div class="input-group"><label>Altura (cm)</label><input type="number" id="sellerProductHeight" min="1" step="0.1" value="5" required /></div>
          <div class="input-group"><label>Largura (cm)</label><input type="number" id="sellerProductWidth" min="1" step="0.1" value="20" required /></div>
          <div class="input-group"><label>Comprimento (cm)</label><input type="number" id="sellerProductLength" min="1" step="0.1" value="30" required /></div>
        </div>

        <div class="input-group"><label>Tamanhos</label><input type="text" id="sellerProductSizes" required /></div>
        <div class="input-group"><label>Imagem URL</label><input type="url" id="sellerProductImage" /></div>
        <label class="checkbox-label"><input type="checkbox" id="sellerProductLaunch" /> Lançamento</label>
        <label class="checkbox-label"><input type="checkbox" id="sellerProductPromotion" /> Promoção ativa</label>
        <button class="btn btn-primary" type="submit">Salvar alterações</button>
      </form>
    </div>
  </main>
  <div class="toast" id="toast"></div>
  <script src="script.js"></script>
</body>
</html>
