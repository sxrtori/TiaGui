<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SportX | Vender produto</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="seller">
  <main class="section">
    <div class="container" style="max-width:880px;">
      <div style="display:flex;gap:10px;margin-bottom:16px;"><a href="index.html" class="btn btn-light">← Voltar para a loja</a><a href="meus-produtos.html" class="btn btn-light">Meus produtos</a></div>
      <h1 style="margin-bottom:10px;">Painel de publicação do vendedor</h1>
      <p class="lead" style="margin-bottom:20px;">Cadastre seu produto com dados completos para aparecer na home, categoria e busca.</p>

      <form id="sellerProductForm" class="auth-form panel seller-form-pro" style="padding:20px; display:grid; gap:14px;">
        <div class="input-group">
          <label>Nome do produto</label>
          <input type="text" id="sellerProductName" required />
        </div>
        <div class="input-group">
          <label>Descrição</label>
          <textarea id="sellerProductDescription" rows="4" required></textarea>
        </div>

        <div class="form-grid" style="grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px;">
          <div class="input-group">
            <label>Preço</label>
            <input type="number" id="sellerProductPrice" min="0" step="0.01" required />
          </div>
          <div class="input-group">
            <label>Desconto (%) opcional</label>
            <input type="number" id="sellerProductDiscount" min="0" max="90" step="1" value="0" />
          </div>
          <div class="input-group">
            <label>Categoria</label>
            <select id="sellerProductCategory" required>
              <option value="Masculino">Masculino</option>
              <option value="Feminino">Feminino</option>
              <option value="Calçados">Calçados</option>
              <option value="Acessórios">Acessórios</option>
              <option value="Esportes">Esportes</option>
            </select>
          </div>
          <div class="input-group">
            <label>Gênero</label>
            <select id="sellerProductGender" required>
              <option value="Unissex">Unissex</option>
              <option value="Masculino">Masculino</option>
              <option value="Feminino">Feminino</option>
            </select>
          </div>
          <div class="input-group">
            <label>Modalidade esportiva</label>
            <input type="text" id="sellerProductSport" placeholder="Ex.: corrida, academia, futebol" required />
          </div>
          <div class="input-group">
            <label>Marca</label>
            <input type="text" id="sellerProductBrand" placeholder="Ex.: Nike" required />
          </div>
          <div class="input-group">
            <label>Cashback (%)</label>
            <input type="number" id="sellerProductCashback" min="0" max="20" step="1" value="3" />
          </div>
          <div class="input-group">
            <label>Estoque</label>
            <input type="number" id="sellerProductStock" min="0" value="1" required />
          </div>
        </div>


        <div class="form-grid" style="grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px;">
          <div class="input-group">
            <label>Peso (kg)</label>
            <input type="number" id="sellerProductWeight" min="0.001" step="0.001" value="0.300" required />
          </div>
          <div class="input-group">
            <label>CEP de origem</label>
            <input type="text" id="sellerProductOriginCep" maxlength="9" value="01001-000" required />
          </div>
          <div class="input-group">
            <label>Altura (cm)</label>
            <input type="number" id="sellerProductHeight" min="1" step="0.1" value="5" required />
          </div>
          <div class="input-group">
            <label>Largura (cm)</label>
            <input type="number" id="sellerProductWidth" min="1" step="0.1" value="20" required />
          </div>
          <div class="input-group">
            <label>Comprimento (cm)</label>
            <input type="number" id="sellerProductLength" min="1" step="0.1" value="30" required />
          </div>
        </div>
        <div class="input-group">
          <label>Tamanhos/numerações (separe por vírgula)</label>
          <input type="text" id="sellerProductSizes" placeholder="Ex.: 38,39,40 ou P,M,G" required />
        </div>

        <div class="input-group">
          <label>Imagem (arquivo ou URL)</label>
          <input type="file" id="sellerProductImageFile" accept="image/*" />
          <small style="color:#666;margin:6px 0;display:block;">Se preferir, informe URL da imagem:</small>
          <input type="url" id="sellerProductImage" />
        </div>

        <label class="checkbox-label"><input type="checkbox" id="sellerProductLaunch" /> Marcar como lançamento</label>
        <label class="checkbox-label"><input type="checkbox" id="sellerProductPromotion" /> Produto em promoção</label>

        <button class="btn btn-primary" type="submit">Publicar produto</button>
      </form>

      <div id="sellerPublishFeedback" style="margin-top:16px;"></div>
      <div id="sellerInfoPanel" style="margin-top:24px;"></div>
    </div>
  </main>

  <div class="toast" id="toast">Ação realizada</div>
  <script src="script.js"></script>
</body>
</html>
